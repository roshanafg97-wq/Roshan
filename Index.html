<!DOCTYPE html>
<html lang="ps">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>پښتو ټایپ چیلنج | ۳ سطحې لوبه</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            font-family: 'Segoe UI', 'Tahoma', 'Noto Nastaliq Urdu', 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
        }

        /* د شالید انیمیشن */
        body::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 50%, rgba(255,255,255,0.05) 0%, transparent 50%);
            animation: pulse 8s infinite;
            pointer-events: none;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.8; }
        }

        .game-wrapper {
            width: 100%;
            max-width: 1400px;
            position: relative;
            z-index: 2;
        }

        /* د سطحو انتخاب */
        .level-selector {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .level-btn {
            background: linear-gradient(145deg, #1e2a3a, #0f1a24);
            border: 2px solid rgba(255,215,0,0.5);
            padding: 15px 35px;
            font-size: 1.3rem;
            font-weight: bold;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.3s ease;
            color: #ffd966;
            box-shadow: 0 8px 0 #0a1117;
        }

        .level-btn.active {
            background: linear-gradient(145deg, #ff9800, #f57c00);
            color: white;
            border-color: #fff;
            transform: translateY(-3px);
            box-shadow: 0 12px 20px rgba(0,0,0,0.3);
        }

        .level-btn:hover {
            transform: translateY(-2px);
        }

        /* د لوبې کارت */
        .game-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(15px);
            border-radius: 50px;
            padding: 25px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
        }

        /* د معلوماتو پینل */
        .info-panel {
            display: flex;
            justify-content: space-between;
            background: rgba(0,0,0,0.5);
            border-radius: 60px;
            padding: 15px 25px;
            margin-bottom: 25px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .info-item {
            background: linear-gradient(145deg, #2c3e50, #1a2632);
            border-radius: 50px;
            padding: 8px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .info-item span:first-child {
            color: #ffd966;
            font-weight: bold;
        }

        .info-item span:last-child {
            font-size: 1.6rem;
            font-weight: bold;
            color: #fff;
            font-family: monospace;
        }

        /* د متن ښودنه */
        .text-display {
            background: #0a0f1a;
            border-radius: 35px;
            padding: 30px;
            margin-bottom: 25px;
            border: 2px solid #ffd966;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
        }

        .target-text {
            font-size: 1.4rem;
            line-height: 2rem;
            color: #ffd966;
            text-align: right;
            font-family: 'Noto Nastaliq Urdu', monospace;
            word-break: break-word;
            letter-spacing: 1px;
        }

        .target-text span {
            transition: all 0.1s ease;
        }

        .target-text span.correct {
            color: #4caf50;
            text-shadow: 0 0 5px #4caf50;
        }

        .target-text span.incorrect {
            color: #ff5252;
            background: rgba(255,82,82,0.2);
            text-decoration: underline;
        }

        .target-text span.current {
            background: #ffd966;
            color: #1a1a2e;
            border-radius: 8px;
            padding: 2px 4px;
            animation: blink 0.8s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        /* د ټایپ انپټ */
        .typing-input {
            width: 100%;
            background: #1a1f2e;
            border: 2px solid #ffd966;
            border-radius: 40px;
            padding: 18px 25px;
            font-size: 1.3rem;
            color: white;
            font-family: 'Noto Nastaliq Urdu', monospace;
            text-align: right;
            margin-bottom: 20px;
            outline: none;
            transition: all 0.3s;
        }

        .typing-input:focus {
            border-color: #ff9800;
            box-shadow: 0 0 15px rgba(255,152,0,0.3);
        }

        /* د تڼیو سټایل */
        .action-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }

        .btn-primary {
            background: linear-gradient(145deg, #ff9800, #f57c00);
            border: none;
            padding: 12px 35px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 5px 0 #b95f00;
        }

        .btn-primary:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #b95f00;
        }

        .btn-secondary {
            background: linear-gradient(145deg, #2c3e50, #1a2632);
            border: 1px solid #ffd966;
            padding: 12px 35px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 40px;
            color: #ffd966;
            cursor: pointer;
        }

        /* د پایلې موډال */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: linear-gradient(145deg, #1e2a3a, #0f1a24);
            border-radius: 50px;
            padding: 40px;
            text-align: center;
            max-width: 500px;
            width: 90%;
            border: 2px solid #ffd966;
        }

        .modal-content h2 {
            color: #ffd966;
            margin-bottom: 20px;
            font-size: 2rem;
        }

        .modal-content p {
            color: white;
            font-size: 1.2rem;
            margin: 15px 0;
        }

        .stats {
            background: rgba(0,0,0,0.5);
            border-radius: 30px;
            padding: 20px;
            margin: 20px 0;
        }

        @media (max-width: 768px) {
            .target-text { font-size: 1rem; }
            .level-btn { padding: 10px 20px; font-size: 1rem; }
            .info-item span:last-child { font-size: 1.2rem; }
        }
    </style>
</head>
<body>

<div class="game-wrapper">
    <!-- د سطحو انتخاب -->
    <div class="level-selector">
        <button class="level-btn" data-level="easy">🌟 سطح ۱ | ۱۰۰ توری</button>
        <button class="level-btn active" data-level="medium">📖 سطح ۲ | ۸۰۰ کلمې</button>
        <button class="level-btn" data-level="hard">⚡ سطح ۳ | تکراري توري</button>
    </div>

    <div class="game-card">
        <div class="info-panel">
            <div class="info-item"><span>⏱️ وخت</span><span id="timerDisplay">00:00</span></div>
            <div class="info-item"><span>🎯 پرمختګ</span><span id="progressDisplay">0%</span></div>
            <div class="info-item"><span>✅ سم</span><span id="correctCount">0</span></div>
            <div class="info-item"><span>❌ غلط</span><span id="wrongCount">0</span></div>
            <div class="info-item"><span>⚡ سرعت</span><span id="speedDisplay">0</span></div>
        </div>

        <div class="text-display">
            <div class="target-text" id="targetText"></div>
        </div>

        <input type="text" class="typing-input" id="typingInput" placeholder="دلته ټایپ پیل کړئ..." autocomplete="off">

        <div class="action-buttons">
            <button class="btn-primary" id="startBtn">▶️ پیلول</button>
            <button class="btn-secondary" id="resetBtn">🔄 بیا پیل</button>
        </div>
    </div>
</div>

<!-- د پایلې موډال -->
<div id="resultModal" class="modal">
    <div class="modal-content">
        <h2 id="modalTitle">🎉 پایلې</h2>
        <div class="stats">
            <p>✅ سم توري: <span id="finalCorrect">0</span></p>
            <p>❌ غلط توري: <span id="finalWrong">0</span></p>
            <p>⚡ دقت: <span id="finalAccuracy">0</span>%</p>
            <p>⏱️ وخت: <span id="finalTime">0</span> ثانیې</p>
            <p>🏆 نمره: <span id="finalScore">0</span></p>
        </div>
        <button class="btn-primary" onclick="closeModal()">نوې لوبه</button>
    </div>
</div>

<script>
    // ======================= د درې سطحو متنونه =======================
    const levelTexts = {
        easy: "ښ ړ ږ ګ ڼ ټ ډ ا ب پ ت ث ج چ ح خ د ذ ر ز ژ س ش ص ض ط ظ ع غ ف ق ک گ ل م ن و ه ی ې ۍ ئ " +
              "ښ ړ ږ ګ ڼ ټ ډ ا ب پ ت ث ج چ ح خ د ذ ر ز ژ س ش ص ض ط ظ ع غ ف ق ک گ ل م ن و ه ی ې ۍ ئ " +
              "ښ ړ ږ ګ ڼ ټ ډ ا ب پ ت ث ج چ ح خ د ذ ر ز ژ س ش ص ض ط ظ ع غ ف ق ک گ ل م ن و ه ی ې ۍ ئ " +
              "پښتو ژبه د پښتنو ملي ژبه ده دا ژبه د پښتنو د کلتور او تمدن سمبول دی",
        
        medium: "پښتو ژبه د هند او اروپايي ژبو له کورنۍ څخه ده چې د ایرانې څانګې پورې اړه لري. " +
                "پښتو د افغانستان دوه ملي ژبو څخه یوه ده او په پاکستان کې یې میلیونونه ویونکي شته. " +
                "دا ژبه د پښتنو قومي ژبه ده چې د پښتنو په ټولنه کې ځانګړی ځای لري. " +
                "پښتو ژبې د پښتو ادب بډایه تاریخ لري چې د رحمان بابا، خوشحال خان خټک، حمزه بابا او نورو " +
                "لویو شاعرانو په واسطه غني شوې ده. د پښتو ژبې رسم الخط د عربي الفبا پر بنسټ ولاړ دی " +
                "چې پکې ځانګړي توري لکه ښ، ړ، ږ، ګ، ڼ، ټ، ډ شامل دي. " +
                "پښتو ژبه په وروستیو کلونو کې د ټیکنالوژۍ په برخه کې هم پرمختګ کړی او اوس په انټرنیټ، " +
                "سوشل میډیا او موبایل اپلیکیشنونو کې د پښتو ژبې کارول زیات شوي دي. " +
                "د پښتو ژبې زده کړه او خپرونه د ټولو پښتنو مسوولیت دی څو خپله ژبه ژوندۍ وساتي. " +
                "پښتو ژبه زموږ پیژندنه ده، زموږ کلتور دی، زموږ هویت دی او موږ باید دې ته پاملرنه وکړو. " +
                "هر پښتون باید په پښتو ژبه خبرې وکړي، ولیکي او ولولي. پښتو ژبه د پښتنو د یووالي سمبول دی. " +
                "راځئ چې ټول سره په پښتو ژبه خبرې وکړو او خپله ژبه نوره هم پیاوړې کړو. " +
                "د پښتو ژبې د ودې لپاره باید هر کس خپله برخه ادا کړي. " +
                "پښتو ژبه زموږ د پلرونو ژبه ده، زموږ د نیکونو میراث دی او موږ باید دې ته درناوی وکړو. " +
                "پښتو ژبه د پښتنو د ملي ویاړ سمبول دی او موږ ټول پښتانه پرې ویاړو. " +
                "پښتو ژبه د پښتنو د کلتور او تمدن بنسټ دی. دا ژبه د پښتنو د شتون نښه ده. " +
                "پښتو ژبه زموږ د ژوند یوه برخه ده او موږ باید د تل لپاره وساتو. " +
                "د پښتو ژبې د ودې لپاره باید په ښوونځیو، پوهنتونونو او رسنیو کې پراخه کار وشي. " +
                "پښتو ژبه د سولې او ورورولۍ ژبه ده. دا ژبه د مینې او یووالي ژبه ده. " +
                "راځئ چې ټول سره پښتو ژبه خپله کړو او د نړۍ په کچه یې خپره کړو. " +
                "پښتو ژبه زموږ د راتلونکي نسل لپاره یو مهم میراث دی. موږ باید دې ته پاملرنه وکړو. " +
                "پښتو ژبه د پښتنو د شتون نښه ده او پرته له دې ژبې پښتون نه دی پښتون. " +
                "پښتو ژبه زموږ د وجود یوه برخه ده. دا ژبه زموږ د روح او نفس سره تړلې ده. " +
                "پښتو ژبه د پښتنو د وحدت او یووالي لامل ده. موږ ټول یو پښتون یو او یوه ژبه لرو. " +
                "پښتو ژبه زموږ د پیژندنې کارت دی. دا کارت باید تل زموږ سره وي. " +
                "پښتو ژبه د پښتنو د تمدن او کلتور بنسټ دی. دا بنسټ باید پیاوړی وساتو. " +
                "پښتو ژبه د پښتنو د عظمت او سترګو نښه ده. موږ ټول پرې ویاړو. " +
                "پښتو ژبه زموږ د نیکونو پېرزوینه ده. دا پېرزوینه باید نسل په نسل انتقال شي. " +
                "پښتو ژبه د پښتنو د ملي هویت سمبول دی. دا سمبول باید تل ژوندی پاتې شي. ",
        
        hard: "ښښښښښ ړړړړړ ږږږږږ ګګګګګ ڼڼڼڼڼ ټټټټټ ډډډډډ " +
              "ببببب پپپپپ تتتتت ثثثثث ججججج چچچچچ ححححح خخخخخ " +
              "ددددد ذذذذذ ررررر ززززز ژژژژژ سسسسس ششششش صصصصص ضضضضض " +
              "ططططط ظظظظظ ععععع غغغغغ ففففف ققققق ککککک گگگگگ للللل ممممم " +
              "ننننن ووووو ههههه ییییی ېېېېې ۍۍۍۍۍ ئئئئئ " +
              "ښښښښښ ړړړړړ ږږږږږ ګګګګګ ڼڼڼڼڼ ټټټټټ ډډډډډ " +
              "ببببب پپپپپ تتتتت ثثثثث ججججج چچچچچ ححححح خخخخخ " +
              "ښښښښښ ړړړړړ ږږږږږ ګګګګګ ڼڼڼڼڼ ټټټټټ ډډډډډ " +
              "ببببب پپپپپ تتتتت ثثثثث ججججج چچچچچ ححححح خخخخخ " +
              "ښښښښښ ړړړړړ ږږږږږ ګګګګګ ڼڼڼڼڼ ټټټټټ ډډډډډ "
    };

    let currentLevel = 'medium';
    let currentText = levelTexts.medium;
    let currentChars = [];
    let currentIndex = 0;
    let correctChars = 0;
    let wrongChars = 0;
    let timeLeft = 0;
    let timerInterval = null;
    let gameActive = false;
    let startTime = null;

    const targetTextDiv = document.getElementById('targetText');
    const typingInput = document.getElementById('typingInput');
    const timerDisplay = document.getElementById('timerDisplay');
    const progressDisplay = document.getElementById('progressDisplay');
    const correctCountSpan = document.getElementById('correctCount');
    const wrongCountSpan = document.getElementById('wrongCount');
    const speedDisplay = document.getElementById('speedDisplay');
    const startBtn = document.getElementById('startBtn');
    const resetBtn = document.getElementById('resetBtn');

    // د سطحې بدلول
    document.querySelectorAll('.level-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentLevel = btn.getAttribute('data-level');
            resetGame();
        });
    });

    function getTimeForLevel() {
        switch(currentLevel) {
            case 'easy': return 60; // 60 ثانیې
            case 'medium': return 180; // 3 دقیقې
            case 'hard': return 90; // 90 ثانیې
            default: return 120;
        }
    }

    function loadLevelText() {
        currentText = levelTexts[currentLevel];
        currentChars = currentText.split('');
        currentIndex = 0;
        correctChars = 0;
        wrongChars = 0;
        updateDisplay();
        updateStats();
    }

    function updateDisplay() {
        let html = '';
        for(let i = 0; i < currentChars.length; i++) {
            let char = currentChars[i];
            let className = '';
            if(i < currentIndex) {
                className = 'correct';
            } else if(i === currentIndex && gameActive) {
                className = 'current';
            } else if(i < currentIndex && currentChars[i] !== currentChars[i]) {
                // د غلطۍ لپاره
            }
            html += `<span class="${className}">${char}</span>`;
        }
        targetTextDiv.innerHTML = html;
        
        // پرمختګ
        let progress = (currentIndex / currentChars.length) * 100;
        progressDisplay.textContent = Math.floor(progress) + '%';
        correctCountSpan.textContent = correctChars;
        wrongCountSpan.textContent = wrongChars;
    }

    function updateStats() {
        correctCountSpan.textContent = correctChars;
        wrongCountSpan.textContent = wrongChars;
        
        if(timeLeft > 0 && correctChars > 0) {
            let speed = Math.floor((correctChars / (getTimeForLevel() - timeLeft)) * 60);
            speedDisplay.textContent = Math.min(speed, 999);
        }
    }

    function startTimer() {
        if(timerInterval) clearInterval(timerInterval);
        timeLeft = getTimeForLevel();
        updateTimerDisplay();
        
        timerInterval = setInterval(() => {
            if(!gameActive) return;
            if(timeLeft <= 0) {
                endGame();
            } else {
                timeLeft--;
                updateTimerDisplay();
                updateStats();
            }
        }, 1000);
    }

    function updateTimerDisplay() {
        let minutes = Math.floor(timeLeft / 60);
        let seconds = timeLeft % 60;
        timerDisplay.textContent = `${minutes.toString().padStart(2,'0')}:${seconds.toString().padStart(2,'0')}`;
    }

    function endGame() {
        gameActive = false;
        if(timerInterval) clearInterval(timerInterval);
        typingInput.disabled = true;
        
        let accuracy = correctChars + wrongChars > 0 ? (correctChars / (correctChars + wrongChars)) * 100 : 0;
        let score = Math.floor(correctChars * 10 - wrongChars * 5);
        if(score < 0) score = 0;
        
        document.getElementById('finalCorrect').textContent = correctChars;
        document.getElementById('finalWrong').textContent = wrongChars;
        document.getElementById('finalAccuracy').textContent = Math.floor(accuracy);
        document.getElementById('finalTime').textContent = getTimeForLevel() - timeLeft;
        document.getElementById('finalScore').textContent = score;
        
        document.getElementById('resultModal').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('resultModal').style.display = 'none';
        resetGame();
    }

    function resetGame() {
        if(timerInterval) clearInterval(timerInterval);
        gameActive = false;
        loadLevelText();
        typingInput.value = '';
        typingInput.disabled = true;
        typingInput.placeholder = 'د پیل لپاره د "پیلول" تڼۍ کېکاږئ';
        startBtn.textContent = '▶️ پیلول';
        updateDisplay();
        timeLeft = getTimeForLevel();
        updateTimerDisplay();
        correctChars = 0;
        wrongChars = 0;
        currentIndex = 0;
        updateStats();
        speedDisplay.textContent = '0';
    }

    function startGame() {
        if(gameActive) return;
        resetGame();
        gameActive = true;
        typingInput.disabled = false;
        typingInput.value = '';
        typingInput.focus();
        startTimer();
        startBtn.textContent = '⏸️ روان دی';
        updateDisplay();
    }

    function checkTyping() {
        if(!gameActive) return;
        
        let inputValue = typingInput.value;
        let expectedChar = currentChars[currentIndex];
        let lastChar = inputValue[inputValue.length - 1];
        
        if(lastChar === expectedChar) {
            correctChars++;
            currentIndex++;
            typingInput.value = '';
            playCorrectSound();
        } else if(lastChar && lastChar !== expectedChar) {
            wrongChars++;
            playWrongSound();
            typingInput.value = '';
            // د غلطۍ انیمیشن
            let currentSpan = document.querySelector('.target-text span.current');
            if(currentSpan) {
                currentSpan.classList.add('incorrect');
                setTimeout(() => currentSpan.classList.remove('incorrect'), 200);
            }
        }
        
        updateDisplay();
        updateStats();
        
        if(currentIndex >= currentChars.length) {
            endGame();
        }
    }

    function playCorrectSound() {
        try {
            let audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            let oscillator = audioCtx.createOscillator();
            let gainNode = audioCtx.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.type = 'sine';
            oscillator.frequency.value = 523.25;
            gainNode.gain.value = 0.15;
            oscillator.start();
            gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.2);
            oscillator.stop(audioCtx.currentTime + 0.2);
        } catch(e) {}
    }

    function playWrongSound() {
        try {
            let audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            let oscillator = audioCtx.createOscillator();
            let gainNode = audioCtx.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.type = 'sawtooth';
            oscillator.frequency.value = 220;
            gainNode.gain.value = 0.2;
            oscillator.start();
            gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.25);
            oscillator.stop(audioCtx.currentTime + 0.25);
        } catch(e) {}
    }

    typingInput.addEventListener('input', checkTyping);
    startBtn.addEventListener('click', startGame);
    resetBtn.addEventListener('click', resetGame);

    // پیلول
    resetGame();
    window.closeModal = closeModal;
</script>
</body>
</html>
